name: Portfolio Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-repos:
    name: Verificar repos del portfolio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Verificar que los repos existen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USUARIO="${{ github.repository_owner }}"
          REPOS=("devopsTP01" "devops-TP02" "devops-gitflow" "devops-TP04" "devops-TP05" "devops-TP06" "devops-TP08" "devops-TP09" "devops-TP10" "devops-TP11")
          ERRORES=0
          for REPO in "${REPOS[@]}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://github.com")
            if [ "$CODE" = "200" ]; then
              echo "[OK] $REPO encontrado"
            else
              echo "[FAIL] $REPO no encontrado (HTTP $CODE)"
              ERRORES=$((ERRORES+1))
            fi
          done
          [ "$ERRORES" -eq 0 ] || exit 1

  lint-readme:
    name: Lint del README principal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Verificar secciones
        run: |
          SECCIONES=("Stack tecnológico" "Proyectos por TP" "Mes 1" "Mes 2" "Mes 3" "Plataformas usadas")
          for SEC in "${SECCIONES[@]}"; do
            grep -q "$SEC" README.md && echo "[OK] Sección: $SEC" || (echo "[FAIL] Falta sección: $SEC" && exit 1)
          done
